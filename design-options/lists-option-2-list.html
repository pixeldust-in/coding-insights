<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lists — Option 2 · Compact Rows</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d;--panel:#101216;--panel-2:#15181e;--line:#1e2228;--line-2:#262b33;
    --text:#e6e9ee;--text-dim:#8b929e;--text-faint:#5a616c;
    --accent:#d97757;--accent-2:#e8a87c;--green:#6ee7a8;--amber:#f5c451;--blue:#7aa2f7;--violet:#b18cf2;
    --mono:'JetBrains Mono',monospace;--sans:'Inter Tight',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
  .sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--line);background:linear-gradient(180deg,#0c0e11,#0a0b0d);display:flex;flex-direction:column;padding:16px 12px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px 18px}
  .brand .logo{width:28px;height:28px;border-radius:7px;background:radial-gradient(circle at 30% 30%,var(--accent-2),var(--accent));display:grid;place-items:center;color:#1a0e08;font-weight:800;font-size:14px}
  .brand b{font-size:14px;font-weight:700}
  .brand small{display:block;font-family:var(--mono);font-size:10px;color:var(--text-faint)}
  .nav a{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:1px}
  .nav a.active{background:var(--panel-2);color:var(--text);box-shadow:inset 2px 0 0 var(--accent)}
  .nav a:hover:not(.active){background:var(--panel);color:var(--text)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;background:rgba(10,11,13,.8);backdrop-filter:blur(10px);z-index:5}
  .crumbs{font-family:var(--mono);font-size:13px;color:var(--text-dim)}.crumbs b{color:var(--text)}
  .content{padding:22px 24px 60px;max-width:1180px;width:100%;margin:0 auto}
  .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)}
  .tabs button{background:none;border:none;color:var(--text-dim);font-family:var(--sans);font-size:14px;font-weight:600;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--text);border-bottom-color:var(--accent)}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line-2);border-radius:9px;padding:8px 12px;width:300px;color:var(--text-faint);font-family:var(--mono);font-size:12.5px}
  .search input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12.5px;flex:1}
  .pill{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line-2);border-radius:9px;padding:8px 12px;color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer}
  .count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-faint)}
  .hide{display:none}

  /* PROJECTS — compact rows inside one bordered list */
  .list{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
  .prow{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .prow:last-child{border-bottom:none}
  .prow:hover{background:var(--panel-2)}
  .pico{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px;color:#0a0b0d}
  .pmain{min-width:0;flex:1}
  .pname{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .ppath{font-family:var(--mono);font-size:11px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
  .pmeta{display:flex;align-items:center;gap:18px;flex-shrink:0}
  .stat{text-align:right}
  .stat .v{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
  .stat .l{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-top:1px}
  .spark{display:flex;align-items:flex-end;gap:2px;height:26px}
  .spark i{width:3px;border-radius:1px;background:var(--accent);opacity:.85}
  .ago{font-family:var(--mono);font-size:11px;color:var(--text-faint);width:96px;text-align:right}
  .chev{color:var(--text-faint);flex-shrink:0}

  /* SESSIONS — two-line rows with leading status rail */
  .srow{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;align-items:flex-start}
  .srow:last-child{border-bottom:none}
  .srow:hover{background:var(--panel-2)}
  .srail{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0}
  .smain{min-width:0;flex:1}
  .sprompt{font-weight:500;font-size:13.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ssub{display:flex;align-items:center;gap:12px;margin-top:7px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:10.5px;color:var(--accent);background:rgba(217,119,87,.1);border:1px solid rgba(217,119,87,.22);border-radius:5px;padding:2px 7px;white-space:nowrap}
  .meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px}
  .dot{width:3px;height:3px;border-radius:50%;background:var(--text-faint)}
  .sright{flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}
  .badge.done{color:var(--green);background:rgba(110,231,168,.1)}
  .badge.partial{color:var(--amber);background:rgba(245,196,81,.1)}
  .stime{font-family:var(--mono);font-size:11px;color:var(--text-faint)}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="logo">✳</div><div><b>Claude Code</b><small>insights</small></div></div>
    <nav class="nav">
      <a href="#">◈ Dashboard</a>
      <a href="#" class="active" id="navP" onclick="show('projects')">◫ Projects</a>
      <a href="#" id="navS" onclick="show('sessions')">◇ Sessions</a>
      <a href="#">↻ History</a>
      <a href="#">▤ Plans</a>
    </nav>
  </aside>
  <div class="main">
    <div class="topbar"><div class="crumbs"><b id="crumb">projects</b></div></div>
    <div class="content">
      <div class="tabs">
        <button id="tabP" class="on" onclick="show('projects')">Projects</button>
        <button id="tabS" onclick="show('sessions')">Sessions</button>
      </div>

      <!-- PROJECTS -->
      <section id="projects">
        <div class="toolbar">
          <div class="search">› <input placeholder="Filter projects…"></div>
          <div class="pill">Sort: Activity ▾</div>
          <span class="count">32 projects</span>
        </div>
        <div class="list" id="plist"></div>
      </section>

      <!-- SESSIONS -->
      <section id="sessions" class="hide">
        <div class="toolbar">
          <div class="search">› <input placeholder="Search sessions…"></div>
          <div class="pill">All Projects ▾</div>
          <div class="pill">Sort: Date ▾</div>
          <span class="count">288 sessions</span>
        </div>
        <div class="list" id="slist"></div>
      </section>
    </div>
  </div>
<script>
  const COLORS=['#d97757','#7aa2f7','#6ee7a8','#f5c451','#b18cf2','#e8709a'];
  const projects=[
    ['pixeldust/vibecoding/claude/dashboard','/Users/mohammed/work/pixeldust/vibecoding/claude-dashboard',3,'12.4M','1 min ago'],
    ['benepower/benepower/backend','/Users/mohammed/work/pixeldust/benepower/benepower/backend',35,'182M','2 days ago'],
    ['ans/solver/codebase','/Users/mohammed/work/pixeldust/ans/solver/codebase',33,'164M','2 days ago'],
    ['iias/vms','/Users/mohammed/work/pixeldust/iias/vms',17,'78.1M','15 hours ago'],
    ['mohammed','/Users/mohammed',13,'52.0M','2 hours ago'],
    ['frappe/solas/bench','/Users/mohammed/work/pixeldust/frappe/solas/bench/apps',11,'44.3M','19 hours ago'],
    ['learning','/Users/mohammed/personal/learning',4,'9.8M','19 hours ago'],
    ['benepower','/Users/mohammed/work/pixeldust/benepower',2,'5.1M','15 hours ago'],
  ];
  const plist=document.getElementById('plist');
  projects.forEach((p,i)=>{
    const c=COLORS[i%COLORS.length];
    const initials=p[0].split('/').pop().slice(0,2).toUpperCase();
    let bars='';for(let k=0;k<12;k++){const h=6+Math.random()*20;bars+=`<i style="height:${h}px;background:${c}"></i>`;}
    plist.insertAdjacentHTML('beforeend',`<div class="prow">
      <div class="pico" style="background:${c}">${initials}</div>
      <div class="pmain">
        <div class="pname">${p[0]}</div>
        <div class="ppath">${p[1]}</div>
      </div>
      <div class="pmeta">
        <div class="spark">${bars}</div>
        <div class="stat"><div class="v">${p[2]}</div><div class="l">sessions</div></div>
        <div class="stat"><div class="v">${p[3]}</div><div class="l">tokens</div></div>
        <div class="ago">${p[4]}</div>
        <span class="chev">›</span>
      </div>
    </div>`);
  });

  const sessions=[
    ['I am not really happy with the current UI/UX of the app. Please generate 3 UI options…','vibecoding/claude/dashboard','#d97757',168,'36m','opus-4.8','done','1 min ago'],
    ['Lately my machine has been crashing very often mainly due to memory usage. Deep introspection…','mohammed','#7aa2f7',152,'40m','opus-4.8','','2 hours ago'],
    ['grill-me · Just like how we are creating Plans and Benefits, build a similar flow for…','benepower','#f5c451',413,'1h 58m','opus-4.6','done','19 hours ago'],
    ['Can you check why am i getting this issue where the UI is not able to render benefit docs…','benepower','#6ee7a8',207,'42m','opus-4.8','partial','15 hours ago'],
    ['We have configured a T-5 day alerts for meetings where voting is done by UTI MF (fundhouse 212)…','iias/vms','#7aa2f7',196,'36m','opus-4.7','done','15 hours ago'],
    ['Can you check why is it that some of the charts are coming as blank lately for claude code usage','vibecoding/claude/dashboard','#6ee7a8',75,'15m','opus-4.8','done','2 hours ago'],
    ['on the session detail page, can we also render the session id and add copy to clipboard…','vibecoding/claude/dashboard','#d97757',50,'11m','opus-4.8','done','2 hours ago'],
  ];
  const slist=document.getElementById('slist');
  sessions.forEach(s=>{
    const badge=s[6]==='done'?'<span class="badge done">completed</span>':s[6]==='partial'?'<span class="badge partial">partial</span>':'';
    slist.insertAdjacentHTML('beforeend',`<div class="srow">
      <div class="srail" style="background:${s[2]}"></div>
      <div class="smain">
        <div class="sprompt">${s[0]}</div>
        <div class="ssub">
          <span class="chip" style="color:${s[2]};background:${s[2]}1a;border-color:${s[2]}3a">${s[1]}</span>
          <span class="meta">${s[3]} msgs</span><span class="dot"></span>
          <span class="meta">${s[4]}</span><span class="dot"></span>
          <span class="meta">${s[5]}</span>
        </div>
      </div>
      <div class="sright">${badge}<span class="stime">${s[7]}</span></div>
    </div>`);
  });

  function show(which){
    document.getElementById('projects').classList.toggle('hide',which!=='projects');
    document.getElementById('sessions').classList.toggle('hide',which!=='sessions');
    document.getElementById('tabP').classList.toggle('on',which==='projects');
    document.getElementById('tabS').classList.toggle('on',which==='sessions');
    document.getElementById('navP').classList.toggle('active',which==='projects');
    document.getElementById('navS').classList.toggle('active',which==='sessions');
    document.getElementById('crumb').textContent=which;
  }
</script>
</body>
</html>
